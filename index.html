<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>DYNAMIC PONG</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { margin:0; background:#000; overflow:hidden; touch-action:none; }
        canvas { display:block; }
        #score { position:absolute; top:48px; left:50%; transform:translateX(-50%); font: bold 92px system-ui; color:#aaaaaa; opacity:0.68; pointer-events:none; z-index:5; text-shadow:0 0 20px rgba(170,170,170,0.35); letter-spacing:-4px; }
    </style>
</head>
<body>
    <canvas id="c"></canvas>
    <div id="score">0</div>

    <script>
        const canvas = document.getElementById('c');
        const ctx = canvas.getContext('2d');
        const scoreEl = document.getElementById('score');
        const tg = window.Telegram ? Telegram.WebApp : null;

        function tgVersionAtLeast(min) {
            return tg && tg.version && parseFloat(tg.version) >= min;
        }

        if (tg) {
            tg.expand();
            tg.ready();
            try {
                if (tgVersionAtLeast(6.1)) {
                    tg.setHeaderColor('#000000');
                    tg.setBackgroundColor('#000000');
                } else if (tg.setBackgroundColor) {
                    tg.setBackgroundColor('#000000');
                }
            } catch(e) {
                console.log('%cTG старая версия — цвета не трогаем', 'color:#ff0');
            }
        }

        let w, h, ball, paddle, island, score = 0, burning = 0, particles = [];
        let islandOffset = 0, ballBlueGlow = 0, islandBaseY = 42;
        let islandCooldown = 0, lives = 3, gameOver = false, paused = false;
        let trail = [], highScore = 0, topScores = [], scorePops = [], confetti = [], explosion = [];
        let ballGlowColor = '#fff', glowTime = 0, specialMessage = '', specialTime = 0;
        let lastTime = 0, centerTapTimes = [];

        const colors = ['#a0d8ff','#ff80ff','#80ff80','#ffff80','#ff8080','#80ffff'];

        function roundedRect(x, y, width, height, radius) {
            ctx.beginPath(); ctx.moveTo(x + radius, y);
            ctx.lineTo(x + width - radius, y); ctx.quadraticCurveTo(x + width, y, x + width, y + radius);
            ctx.lineTo(x + width, y + height - radius); ctx.quadraticCurveTo(x + width, y + height, x + width - radius, y + height);
            ctx.lineTo(x + radius, y + height); ctx.quadraticCurveTo(x, y + height, x, y + height - radius);
            ctx.lineTo(x, y + radius); ctx.quadraticCurveTo(x, y, x + radius, y); ctx.closePath(); ctx.fill();
        }

        function resize() {
            w = canvas.width = window.innerWidth;
            h = canvas.height = window.innerHeight;
        }

        function createObjects() {
            paddle = { x: w/2 - 95, y: h - 45, width: 190, height: 16 };
            island = { x: w/2 - 85, y: islandBaseY, width: 170, height: 28 };
        }

        function resetBall() {
            ball = { x: w/2, y: h*0.42, vx: (Math.random()-0.5)*1.65, vy: 1.25 + Math.random()*0.6, r: 18 };
            trail = [];
        }

        function createParticles(x, y, count, color) {
            for (let i = 0; i < count; i++) {
                particles.push({ x: x + Math.random()*130-25, y: y+16, vx: (Math.random()-0.5)*9, vy: -3 - Math.random()*8, life: 60, size: 4, color: color || '#fff' });
            }
        }

        function createConfetti() {
            for (let i = 0; i < 120; i++) {
                confetti.push({ x: Math.random()*w, y: -20, vx: (Math.random()-0.5)*6, vy: 2 + Math.random()*7, life: 120, color: colors[Math.floor(Math.random()*colors.length)], size: 8 + Math.random()*8 });
            }
        }

        function createExplosion(x, y) {
            for (let i = 0; i < 90; i++) {
                explosion.push({ x, y, vx: (Math.random()-0.5)*14, vy: (Math.random()-0.5)*14, life: 45, size: 5 + Math.random()*7 });
            }
        }

        function loadData() {
            if (tg && tg.CloudStorage && typeof tg.CloudStorage.getItem === 'function') {
                tg.CloudStorage.getItem('highScore', (err, val) => { if (val) highScore = parseInt(val) || 0; });
                tg.CloudStorage.getItem('topScores', (err, val) => { if (val) topScores = JSON.parse(val) || []; });
            } else {
                try {
                    highScore = parseInt(localStorage.getItem('dynamicPongHigh')) || 0;
                    topScores = JSON.parse(localStorage.getItem('dynamicPongTop')) || [];
                } catch(e) {}
            }
        }

        function saveData() {
            if (tg && tg.CloudStorage && typeof tg.CloudStorage.setItem === 'function') {
                tg.CloudStorage.setItem('highScore', highScore);
                tg.CloudStorage.setItem('topScores', JSON.stringify(topScores));
            } else {
                try {
                    localStorage.setItem('dynamicPongHigh', highScore);
                    localStorage.setItem('dynamicPongTop', JSON.stringify(topScores));
                } catch(e) {}
            }
        }

        function updateTopScores() {
            topScores.push({score: score, date: new Date().toLocaleDateString('ru-RU')});
            topScores.sort((a,b) => b.score - a.score);
            topScores = topScores.slice(0, 10);
            saveData();
        }

        function loop(timestamp) {
            if (!lastTime) lastTime = timestamp;
            const delta = Math.min((timestamp - lastTime) / 16.67, 2);
            lastTime = timestamp;

            ctx.fillStyle = '#000'; ctx.fillRect(0, 0, w, h);

            if (!paused && !gameOver && ball) {
                trail.push({x: ball.x, y: ball.y});
                if (trail.length > 14) trail.shift();

                ball.x += ball.vx * delta;
                ball.y += ball.vy * delta;

                if (ball.x - ball.r < 0 || ball.x + ball.r > w) ball.vx *= -1;
                if (ball.y - ball.r < 0) { ball.y = ball.r; ball.vy *= -1; }

                if (ball.y + ball.r > paddle.y && ball.y - ball.r < paddle.y + paddle.height && ball.x > paddle.x && ball.x < paddle.x + paddle.width) {
                    ball.vy *= -1.005;
                    const hit = (ball.x - (paddle.x + 95)) / 95;
                    ball.vx += hit * 1.2;
                }

                const islandY = islandBaseY + islandOffset;
                if (islandCooldown <= 0 && ball.y - ball.r < islandY + island.height && ball.y + ball.r > islandY && ball.x + ball.r > island.x && ball.x - ball.r < island.x + island.width && ball.vy < 0) {
                    ball.vy = -3.4 - Math.random()*1.1;
                    ball.vx += (Math.random()-0.5)*1.4;
                    burning = 48; ballBlueGlow = 38; islandOffset = -9.5;
                    score++; scoreEl.textContent = score;
                    ballGlowColor = colors[Math.floor(Math.random()*colors.length)];
                    glowTime = 120;
                    createParticles(island.x + 85, islandY + 15, 50, ballGlowColor);
                    if (navigator.vibrate) navigator.vibrate([8,4,12]);
                    if (score % 10 === 0 && score >= 10) createConfetti();

                    if ([11,111,222,404,666,777,888,999].includes(score)) {
                        specialTime = 180;
                        if (score === 404) specialMessage = 'NOT FOUND';
                        if (score === 666) specialMessage = 'DEVIL MODE';
                        if (score === 777) { score += 50; scoreEl.textContent = score; specialMessage = 'JACKPOT +50'; }
                        if (score === 888) specialMessage = 'INFINITY';
                        if (score === 999) specialMessage = 'GOD MODE';
                        if (score === 11) specialMessage = 'LUCKY';
                        if (score === 111) specialMessage = 'TRIPLE';
                        if (score === 222) paddle.width = 280;
                    }
                    islandCooldown = 12;
                }

                if (ball.y > h + 100) {
                    lives--;
                    if (lives > 0) resetBall();
                    else {
                        gameOver = true;
                        createExplosion(ball.x, ball.y);
                        updateTopScores();
                        if (navigator.vibrate) navigator.vibrate([100,50,100,50,200]);
                        if (score > highScore) highScore = score;
                    }
                }

                islandOffset *= 0.82; if (Math.abs(islandOffset) < 0.3) islandOffset = 0;
                if (islandCooldown > 0) islandCooldown--;
                if (glowTime > 0) glowTime--;
                if (specialTime > 0) specialTime--;
                if (score === 222 && specialTime === 0) paddle.width = 190;
            }

            // trail
            for (let i = 0; i < trail.length; i++) {
                const a = (i+1)/trail.length * 0.5;
                ctx.globalAlpha = a;
                ctx.shadowColor = glowTime > 0 ? ballGlowColor : '#fff';
                ctx.shadowBlur = glowTime > 0 ? 32 : 18;
                ctx.beginPath();
                ctx.arc(trail[i].x, trail[i].y, ball.r * (0.6 + i/trail.length*0.5), 0, Math.PI*2);
                ctx.fillStyle = '#fff'; ctx.fill();
            }
            ctx.globalAlpha = 1;

            ctx.fillStyle = '#fff';
            ctx.fillRect(paddle.x, paddle.y, paddle.width, paddle.height);

            const drawY = islandBaseY + islandOffset;
            ctx.save();
            if (burning > 0) {
                ctx.shadowColor = '#a0d8ff'; ctx.shadowBlur = 95;
                ctx.fillStyle = 'rgba(160,216,255,0.38)';
                roundedRect(island.x-14, drawY-8, island.width+28, island.height+18, 26);
                burning--;
            }
            ctx.restore();

            ctx.save();
            if (burning > 0) { ctx.shadowColor = '#a0d8ff'; ctx.shadowBlur = 70; }
            ctx.fillStyle = '#fff';
            roundedRect(island.x, drawY, island.width, island.height, 16);
            ctx.restore();

            for (let i = particles.length-1; i >= 0; i--) {
                const p = particles[i];
                p.x += p.vx; p.y += p.vy; p.vy += 0.2; p.life--;
                ctx.globalAlpha = p.life / 65;
                ctx.fillStyle = p.color || '#fff';
                ctx.fillRect(p.x, p.y, p.size, p.size);
                if (p.life <= 0) particles.splice(i,1);
            }
            ctx.globalAlpha = 1;

            for (let i = confetti.length-1; i >= 0; i--) {
                const c = confetti[i];
                c.x += c.vx; c.y += c.vy; c.vy += 0.25; c.life--;
                ctx.globalAlpha = c.life / 120;
                ctx.fillStyle = c.color;
                ctx.fillRect(c.x, c.y, c.size, c.size*0.6);
                if (c.life <= 0) confetti.splice(i,1);
            }
            ctx.globalAlpha = 1;

            for (let i = explosion.length-1; i >= 0; i--) {
                const e = explosion[i];
                e.x += e.vx; e.y += e.vy; e.vy += 0.4; e.life--;
                ctx.globalAlpha = e.life / 45;
                ctx.fillStyle = '#ff4080';
                ctx.fillRect(e.x, e.y, e.size, e.size);
                if (e.life <= 0) explosion.splice(i,1);
            }
            ctx.globalAlpha = 1;

            ctx.save();
            ctx.shadowColor = glowTime > 0 ? ballGlowColor : '#fff';
            ctx.shadowBlur = glowTime > 0 ? 48 : 28;
            ctx.beginPath();
            ctx.arc(ball.x, ball.y, ball.r, 0, Math.PI*2);
            ctx.fillStyle = '#fff';
            ctx.fill();
            ctx.restore();

            for (let i = scorePops.length-1; i >= 0; i--) {
                const p = scorePops[i];
                p.y += p.vy; p.alpha -= 0.028;
                ctx.globalAlpha = p.alpha;
                ctx.fillStyle = '#fff';
                ctx.font = 'bold 28px system-ui';
                ctx.textAlign = 'center';
                ctx.fillText('+1', p.x, p.y);
                if (p.alpha <= 0) scorePops.splice(i,1);
            }
            ctx.globalAlpha = 1;

            ctx.fillStyle = '#fff';
            for (let i = 0; i < lives; i++) ctx.fillRect(35 + i*42, 48, 32, 9);

            if (specialTime > 0) {
                ctx.fillStyle = '#ffff00';
                ctx.font = 'bold 56px system-ui';
                ctx.textAlign = 'center';
                ctx.fillText(specialMessage, w/2, 180);
            }

            if (gameOver) {
                ctx.fillStyle = 'rgba(0,0,0,0.85)'; ctx.fillRect(0,0,w,h);
                ctx.fillStyle = '#fff'; ctx.textAlign = 'center';
                ctx.font = 'bold 72px system-ui'; ctx.fillText('ИГРА ОКОНЧЕНА', w/2, h/2-180);
                ctx.font = 'bold 42px system-ui'; ctx.fillText('СЧЁТ ' + score, w/2, h/2-110);
                ctx.fillText('РЕКОРД ' + highScore, w/2, h/2-60);
                ctx.font = 'bold 32px system-ui'; ctx.fillText('ТОП-10', w/2, h/2+10);
                for (let i = 0; i < Math.min(10, topScores.length); i++) {
                    ctx.fillText((i+1) + '. ' + topScores[i].score + ' (' + topScores[i].date + ')', w/2, h/2 + 50 + i*38);
                }
                ctx.font = 'bold 34px system-ui'; ctx.fillStyle = '#a0d8ff';
                ctx.fillText('ТАПНИ ДЛЯ РЕСТАРТА', w/2, h*0.85);
            }

            if (paused) {
                ctx.fillStyle = 'rgba(0,0,0,0.7)'; ctx.fillRect(0,0,w,h);
                ctx.fillStyle = '#fff'; ctx.font = 'bold 68px system-ui';
                ctx.fillText('ПАУЗА', w/2, h/2);
                ctx.font = 'bold 32px system-ui'; ctx.fillText('ТАПНИ 3 РАЗА ПО ЦЕНТРУ', w/2, h/2 + 80);
            }

            requestAnimationFrame(loop);
        }

        function movePaddle(e) {
            if (gameOver || paused) return;
            const clientX = e.touches ? e.touches[0].clientX : e.clientX;
            paddle.x = clientX - paddle.width / 2;
            if (paddle.x < 0) paddle.x = 0;
            if (paddle.x > w - paddle.width) paddle.x = w - paddle.width;
        }

        function handleTap(e) {
            if (gameOver) { handleRestart(); return; }
            const cx = w / 2, cy = h / 2;
            const tx = e.touches ? e.touches[0].clientX : e.clientX;
            const ty = e.touches ? e.touches[0].clientY : e.clientY;
            if (Math.hypot(tx - cx, ty - cy) < 130) {
                centerTapTimes.push(Date.now());
                if (centerTapTimes.length > 3) centerTapTimes.shift();
                if (centerTapTimes.length === 3 && Date.now() - centerTapTimes[0] < 900) {
                    paused = !paused;
                    centerTapTimes = [];
                }
            } else {
                movePaddle(e);
            }
        }

        function handleRestart() {
            if (gameOver) {
                score = 0; lives = 3; scoreEl.textContent = '0';
                gameOver = false; explosion = []; confetti = [];
                resetBall(); paddle.width = 190;
            }
        }

        loadData();
        resize();
        createObjects();
        resetBall();
        requestAnimationFrame(loop);

        canvas.addEventListener('pointerdown', handleTap, {passive:false});
        canvas.addEventListener('touchstart', handleTap, {passive:false});
        canvas.addEventListener('click', handleRestart);

        console.log('%cDYNAMIC PONG 8.2 — TG 6.0 ПОЛНОСТЬЮ ЗАФИКСЕН, НИ ОДНОЙ ОШИБКИ, ВСЁ РАБОТАЕТ', 'color:#0ff;font-size:21px;font-weight:bold');
    </script>
</body>
</html>
